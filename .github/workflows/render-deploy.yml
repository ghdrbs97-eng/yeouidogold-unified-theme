name: Test and Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax and backend tests
        run: |
          python -m py_compile server.py
          node --check site/original-ui.js
          node --check site/js/site_shop/site_shop.js
          python -m unittest tests/test_backend_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook if configured
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Triggered Render deploy hook."
          else
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. If Render Auto Deploy is enabled, push already triggered deployment."
          fi
